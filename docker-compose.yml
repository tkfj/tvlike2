services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    command: sh -c "php artisan optimize && php-fpm"
    restart: always
    volumes:
      - ./.env:/var/www/.env
      - ../tvdb:/var/www/db
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
  web:
    image: nginx:alpine
    restart: always
    ports:
      - "8099:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    volumes_from:
      - app
